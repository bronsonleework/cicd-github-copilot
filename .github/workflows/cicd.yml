name: Copilot SDK Agent (Claude Opus 4.7)

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install copilot-sdk

      - name: Run Copilot agent
        env:
          # Required for repo context access
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ✅ Required for Copilot usage in CI
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          python run_agent.py
